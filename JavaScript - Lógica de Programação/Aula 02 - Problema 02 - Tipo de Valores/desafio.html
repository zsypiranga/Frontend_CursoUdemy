<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio dos Operadores</title>
</head>
<body>
    <script>

        let x = 10;
        
        x += 5;
        x -= 5;
        x += 1;

        alert(
            "SOMA: " + (x + 5) + "\n" +
            "MULTIPLICAÇÃO: " + (x  * 5) + "\n" +
            "SOMA COM INCREMENTO: " + (++x) + "\n" +
            "O resto da divisão de " + (x) + " por 6 é " + (x % 6) + "\n" +
            "O quadrado do resto da divisão de " + x + " por 6 é " + ((x % 6) ** 2)
        )

    </script>
</body>
</html>
