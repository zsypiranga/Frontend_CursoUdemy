<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1>Segundo Exemplo</h1>

    <script>
        let valor1 = prompt("Digite um número: ");
        valor1 = parseFloat(valor1);

        let valor2 = prompt("Digite o segundo numero: ");
        valor2 = parseFloat(valor2);

        alert(
            "A Divisão é: " + (valor1 / valor2) + "\n" +
            "A Multiplicação é: " + (valor1 * valor2) + "\n" +
            "A Subtração é: " + (valor1 - valor2) + "\n" +
            "A Soma é: " + (valor1 + valor2) + "\n"
            )

        
    </script>
    
</body>
</html>
