<body>
    <script>
        let valor1 = parseFloat(prompt("Digite um número de 0 À 10"));
        let valor2 = parseFloat(prompt("Digite outro número de 0 À 10"));

        let media = (valor1 + valor2) / 2

        alert("A média é maior que 7 ? " +  (media > 7));

    </script>
